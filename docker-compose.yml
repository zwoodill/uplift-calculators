services:
  web:
    image: nginx:1.27-alpine
    # Whole-directory mount (not per-file): git pull replaces file inodes,
    # which would leave single-file bind mounts serving stale content.
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Bind this app's assigned port on the workspace VM; the registrar routes
    # https://systems.uplift.us to this host:port over the tailnet.
    ports:
      - "8101:80"
    restart: unless-stopped
